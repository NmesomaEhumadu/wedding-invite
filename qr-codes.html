<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Seating QRs | Print List</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 40px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 { color: #043927; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; }
        
        .nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-width: 800px;
            margin: 0 auto 40px;
            padding: 10px;
            background: #fff;
            border-radius: 99px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .nav-link {
            text-decoration: none;
            color: #043927;
            font-weight: 600;
            font-size: 13px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .nav-link:hover { background: #e1e9e5; }

        .table-section {
            margin-bottom: 80px;
            page-break-before: always;
        }
        .table-header {
            font-size: 1.8rem;
            font-weight: 700;
            color: #043927;
            text-align: center;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }
        .table-header span {
            border-bottom: 2px solid #043927;
            padding-bottom: 5px;
        }
        .btn-small {
            background: #043927;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .btn-small:hover { opacity: 0.9; }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }
        
        .qr-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            page-break-inside: avoid;
        }
        
        .qr-card img {
            width: 100%;
            max-width: 200px;
            height: auto;
            aspect-ratio: 1/1;
            display: block;
            margin: 0 auto 15px;
        }
        
        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #999;
            margin-bottom: 8px;
        }
        
        .numbers {
            font-weight: 700;
            color: #043927;
            font-size: 16px;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }
        
        .btn {
            background: #043927;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }
        .btn:hover { background: #032b1d; }

        @media print {
            .controls, .nav, .btn-small { display: none !important; }
            body { padding: 0 !important; background: #fff !important; }
            .table-section { margin-bottom: 0 !important; }
            
            /* If printing a specific table */
            body.print-single .table-section { display: none !important; }
            body.print-single .table-section.active-print { display: block !important; }
            
            .table-header { margin-top: 0 !important; border: none !important; margin-bottom: 40px !important; }
            .table-header span { border: none !important; font-size: 1.2rem !important; }

            .table-grid { display: block !important; }
            .qr-card { 
                box-shadow: none !important; 
                border: none !important; 
                padding: 0 !important; 
                page-break-after: always !important;
                height: 100vh !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
            }
            .qr-card img { 
                width: 80% !important; 
                max-width: 400px !important; 
            }
            .numbers { font-size: 1.5rem !important; margin-top: 20px !important; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn" onclick="window.print()">Print all QR Codes</button>
    </div>

    <header>
        <h1>Wedding QR Code List</h1>
        <p>26 Tables &bull; 10 Seats per Table</p>
        <p>Sorted by Table for easy sharing.</p>
    </header>

    <div class="nav" id="tableNav">
        <!-- Table links will be generated here -->
    </div>

    <div id="tablesContainer">
        <!-- Table groups will be generated here -->
    </div>

    <script>
        const container = document.getElementById('tablesContainer');
        const nav = document.getElementById('tableNav');
        
        let baseUrl = window.location.href.split('qr-codes.html')[0];
        if (!baseUrl.endsWith('/')) baseUrl += '/';
        const targetUrl = baseUrl + 'index.html';

        for (let t = 1; t <= 26; t++) {
            // Create Nav Link
            const navLink = document.createElement('a');
            navLink.className = 'nav-link';
            navLink.href = `#table-${t}`;
            navLink.innerText = t;
            nav.appendChild(navLink);

            // Create Table Section
            const section = document.createElement('div');
            section.className = 'table-section';
            section.id = `table-${t}`;
            section.innerHTML = `
                <div class="table-header">
                    <span>Table ${t}</span>
                    <button class="btn-small" onclick="printTable(${t})">Download PDF</button>
                </div>
                <div class="table-grid" id="grid-${t}"></div>
            `;
            container.appendChild(section);

            const grid = document.getElementById(`grid-${t}`);

            for (let s = 1; s <= 10; s++) {
                const sid = (t - 1) * 10 + s;
                const link = `${targetUrl}?sid=${sid}`;
                const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(link)}`;
                
                const card = document.createElement('div');
                card.className = 'qr-card';
                card.innerHTML = `
                    <div class="label">Table ${t}</div>
                    <img src="${qrSrc}" alt="QR Code">
                    <div class="numbers">Seat ${s}</div>
                `;
                grid.appendChild(card);
            }
        }

        function printTable(t) {
            const section = document.getElementById(`table-${t}`);
            document.body.classList.add('print-single');
            section.classList.add('active-print');
            
            // Trigger print
            window.print();
            
            // Cleanup after a delay (dialog closes)
            setTimeout(() => {
                document.body.classList.remove('print-single');
                section.classList.remove('active-print');
            }, 1000);
        }
    </script>
</body>
</html>
