<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Honored Guest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Alex+Brush&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            background-image: url('final_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @media (min-width: 1024px) {
            body { background-size: contain; background-repeat: no-repeat; background-position: center; }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: -1;
        }

        #stage {
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 10;
            width: 100%;
            height: 100%;
        }
        #stage.fade-back {
            opacity: 0.1;
            transform: scale(0.85) translateY(20px);
            pointer-events: none;
        }

        .envelope-wrapper {
            position: relative;
            width: 75vw;
            height: 105vw;
            max-width: 320px;
            max-height: 450px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wax-seal {
            position: absolute;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            border-radius: 50%;
            z-index: 30;
            background: transparent;
        }

        .flap {
            position: absolute;
            top: 26%; left: 5%;
            width: 90%; height: 35%;
            background: #043927;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 10;
            opacity: 0;
            transform-origin: top;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }
        .envelope-wrapper.opened .flap { opacity: 1; }
        .flap.open { transform: perspective(1000px) rotateX(-170deg); }

        /* CARD OVERLAY */
        #cardOverlay {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            padding: 15px;
        }
        #cardOverlay.visible { opacity: 1; pointer-events: auto; }

        .card {
            background: #ffffff;
            width: 440px;
            max-width: 100%;
            max-height: 92vh;
            border-radius: 6px;
            box-shadow: 0 60px 140px rgba(0,0,0,1);
            position: relative;
            transform: scale(0.85) translateY(60px);
            transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1);
            overflow: hidden;
            border: 1px solid rgba(4, 57, 39, 0.2);
        }
        #cardOverlay.visible .card { transform: scale(1) translateY(0); }

        /* INTRICATE FLORAL SVG CORNERS */
        .floral-svg {
            position: absolute;
            width: 130px;
            height: 130px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.9;
        }
        .floral-tl { top: -10px; left: -10px; }
        .floral-br { bottom: -10px; right: -10px; transform: rotate(180deg); }

        .card-body {
            position: relative;
            margin: 15px;
            border: 1.5px solid rgba(4, 57, 39, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 25px;
            z-index: 10;
        }
        .card::after { content: ''; display: block; padding-top: 140%; }

        .reveal-item { opacity: 0; transform: translateY(15px); }

        .card-script { 
            font-family: 'Alex Brush', cursive; 
            color: #043927; 
            font-size: 5rem; 
            line-height: 1.2; 
            margin-bottom: 25px;
        }

        .card-text { 
            font-size: 11px; 
            letter-spacing: 0.18em; 
            color: #333; 
            line-height: 1.8; 
            font-weight: 600; 
            text-transform: uppercase; 
            margin-bottom: 40px; 
            max-width: 290px;
        }

        .line-divider { 
            width: 70px; height: 2px; 
            background: linear-gradient(to right, transparent, #C8A84B, transparent); 
            margin-bottom: 40px; 
        }
        
        .badge-label { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #888; margin-bottom: 15px; }

        .seat-badge { 
            font-family: 'Playfair Display', serif; 
            font-size: 2rem; 
            font-weight: 700; 
            color: #C8A84B; 
            letter-spacing: 0.08em; 
            background: #043927;
            padding: 18px 35px;
            border-radius: 4px;
            box-shadow: 0 15px 40px rgba(4, 57, 39, 0.4);
            border: 1px solid rgba(200, 168, 75, 0.25);
        }

        @media (max-width: 480px) {
            .card-script { font-size: 3.8rem; }
            .card-text { font-size: 10px; }
            .seat-badge { font-size: 1.6rem; padding: 15px 25px; }
            .floral-svg { width: 100px; height: 100px; }
        }

        .footer-text { font-size: 8px; letter-spacing: .5em; text-transform: uppercase; color: #ccc; margin-top: 50px; }

        .card-close { position: absolute; top: 15px; right: 15px; font-size: 18px; color: #ccc; cursor: pointer; z-index: 100; }
        .tap-hint { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 9px; letter-spacing: 0.5em; text-transform: uppercase; color: #fff; z-index: 20; }
    </style>
</head>
<body>

<div id="cardOverlay">
    <div class="card">
        <div class="card-close" onclick="closeCard()">✕</div>

        <!-- INTRICATE FLORAL CORNER SVG 1 -->
        <svg class="floral-svg floral-tl" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 20C40 60 100 80 140 40M40 100C60 140 120 160 160 120M20 20C60 40 80 100 40 140" stroke="#043927" stroke-width="2" opacity="0.6"/>
            <circle cx="30" cy="30" r="15" fill="#043927" opacity="0.4"/>
            <circle cx="130" cy="50" r="8" fill="#C8A84B" opacity="0.3"/>
            <path d="M10 10 Q 50 10, 50 50" stroke="#C8A84B" stroke-width="1.5" opacity="0.5"/>
            <path d="M20 60 C 40 40, 80 40, 100 60" stroke="#043927" stroke-width="1" opacity="0.4"/>
            <!-- Add organic rose-like swirls -->
            <path d="M40 40 C 60 20, 90 20, 110 40 C 130 60, 130 90, 110 110" stroke="#043927" stroke-width="1"/>
            <path d="M30 30 C 15 45, 15 75, 30 90" stroke="#C8A84B" stroke-width="1"/>
        </svg>

        <!-- INTRICATE FLORAL CORNER SVG 2 -->
        <svg class="floral-svg floral-br" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 20C40 60 100 80 140 40M40 100C60 140 120 160 160 120M20 20C60 40 80 100 40 140" stroke="#043927" stroke-width="2" opacity="0.6"/>
            <circle cx="30" cy="30" r="15" fill="#043927" opacity="0.4"/>
            <circle cx="130" cy="50" r="8" fill="#C8A84B" opacity="0.3"/>
            <path d="M10 10 Q 50 10, 50 50" stroke="#C8A84B" stroke-width="1.5" opacity="0.5"/>
            <!-- Rose swirl -->
            <path d="M40 40 C 60 20, 90 20, 110 40 C 130 60, 130 90, 110 110" stroke="#043927" stroke-width="1"/>
        </svg>

        <div class="card-body">
            <h1 class="card-script reveal-item">Welcome</h1>
            <p class="card-text reveal-item">We're honored to have you celebrate this special day with us.</p>
            <div class="line-divider reveal-item"></div>
            <div class="reveal-item">
                <p class="badge-label">Your Assigned Seat</p>
                <div class="seat-badge">
                    Table <span id="tableNo">TBA</span>, Seat <span id="seatNo">TBA</span>
                </div>
            </div>
            <p class="footer-text reveal-item">Wedding Celebration &nbsp;•&nbsp; 2026</p>
        </div>
    </div>
</div>

<div id="stage">
    <div class="envelope-wrapper" id="envelopeWrapper" onclick="openInvitation()">
        <div class="flap" id="flap"></div>
        <div class="wax-seal" id="waxSeal"></div>
    </div>
</div>

<div class="tap-hint" id="tapHint">Tap to Open</div>

<script>
    const params = new URLSearchParams(window.location.search);
    let table = params.get('table') || '';
    let seat = params.get('seat') || '';
    const sid = params.get('sid');
    if (sid && !table && !seat) {
        const idNum = parseInt(sid);
        if (!isNaN(idNum) && idNum > 0) {
            table = Math.ceil(idNum / 10);
            seat  = ((idNum - 1) % 10) + 1;
        }
    }
    document.getElementById('tableNo').innerText = table || 'TBA';
    document.getElementById('seatNo').innerText  = seat  || 'TBA';

    let isOpen = false;
    function openInvitation() {
        if (isOpen) return;
        isOpen = true;
        const wrapper = document.getElementById('envelopeWrapper');
        const flap    = document.getElementById('flap');
        const stage   = document.getElementById('stage');
        const overlay = document.getElementById('cardOverlay');
        const hint    = document.getElementById('tapHint');
        wrapper.classList.add('opened');
        flap.classList.add('open');
        gsap.to(hint, { opacity: 0, duration: 0.3 });
        setTimeout(() => stage.classList.add('fade-back'), 800);
        setTimeout(() => {
            overlay.classList.add('visible');
            gsap.to(".reveal-item", { opacity: 1, y: 0, duration: 1.2, stagger: 0.3, ease: "power2.out", delay: 0.4 });
        }, 1100);
        setTimeout(() => {
            confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 }, colors: ['#043927', '#C8A84B', '#ffffff'] });
        }, 1500);
    }
    function closeCard() {
        document.getElementById('cardOverlay').classList.remove('visible');
        setTimeout(() => {
            document.getElementById('stage').classList.remove('fade-back');
            gsap.set(".reveal-item", { opacity: 0, y: 15 });
            isOpen = false;
        }, 400);
    }
</script>
</body>
</html>
