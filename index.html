<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Honored Guest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Alex+Brush&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            background-image: url('final_bg.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Dark overlay for focus */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: -1;
        }

        /* =============================================
           INTERACTION STAGE
           ============================================= */
        #stage {
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 10;
            width: 100%;
            height: 100%;
            perspective: 1500px;
        }
        #stage.fade-back {
            opacity: 0.1;
            transform: scale(0.75) translateY(20px);
            pointer-events: none;
        }

        /* More "zoomed out" feel on large screens */
        @media (min-width: 1024px) {
            #stage {
                transform: scale(0.8);
            }
        }

        .envelope-wrapper {
            position: relative;
            width: 85vmin;
            height: 120vmin;
            max-width: 320px;
            max-height: 450px;
            cursor: pointer;
        }

        /* Transparent click zone for the central seal area */
        .wax-seal {
            position: absolute;
            top: 55%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            z-index: 30;
            background: transparent;
        }

        /* REALISTIC FLAP OVERLAY (Matches visual position) */
        .flap {
            position: absolute;
            top: 40.5%; /* Correctly aligned with the visual flap fold line */
            left: 0;
            width: 100%;
            height: 25%;
            background: #043927;
            /* Matches the shape of the envelope flap exactly */
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 10;
            opacity: 0;
            transform-origin: top;
            transition: transform 1.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2);
        }
        .envelope-wrapper.opened .flap {
            opacity: 1;
        }
        .flap.open {
            transform: rotateX(-165deg);
        }

        /* CARD OVERLAY */
        #cardOverlay {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        #cardOverlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .card {
            background: #ffffff;
            width: 90vmin;
            max-width: 380px;
            max-height: 85vh;
            border-radius: 4px;
            box-shadow: 0 60px 150px rgba(0,0,0,0.9);
            border: 1px solid rgba(4, 57, 39, 0.1);
            position: relative;
            transform: scale(0.8) translateY(60px);
            transition: transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
            overflow: hidden;
        }
        #cardOverlay.visible .card {
            transform: scale(1) translateY(0);
        }

        .card-body {
            position: absolute;
            inset: 16px;
            border: 1.5px solid rgba(4, 57, 39, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            padding: 50px 20px;
            overflow-y: auto;
        }
        .card::after {
            content: '';
            display: block;
            padding-top: 140%;
        }

        .card-script { font-family: 'Alex Brush', cursive; color: #043927; font-size: 4rem; line-height: 1; margin-bottom: 25px; }
        .card-text { font-size: 10px; letter-spacing: 0.16em; color: #333; line-height: 1.9; font-weight: 500; text-transform: uppercase; margin-bottom: 40px; max-width: 260px; }
        .line-divider { width: 40px; height: 2px; background: #C8A84B; margin-bottom: 40px; opacity: 0.6; }
        
        .badge-label { font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; color: #999; margin-bottom: 15px; }
        .seat-badge { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.8rem; 
            font-weight: 700; 
            color: #C8A84B; 
            letter-spacing: 0.05em; 
            background: #043927;
            padding: 16px 35px;
            border-radius: 4px;
            box-shadow: 0 15px 40px rgba(4, 57, 39, 0.35);
        }

        @media (max-width: 480px) {
            .card-script { font-size: 3rem; }
            .card-text { font-size: 9px; line-height: 1.6; }
            .seat-badge { font-size: 1.5rem; padding: 12px 28px; }
            .card-body { padding: 35px 15px; }
        }

        .footer-text { font-size: 7px; letter-spacing: .5em; text-transform: uppercase; color: #bbb; margin-top: auto; padding-top: 25px; }
        .card-close { position: absolute; top: 15px; right: 15px; font-size: 20px; color: #ccc; cursor: pointer; z-index: 10; opacity: 0.6; transition: 0.3s; }
        .card-close:hover { opacity: 1; color: #000; }

        .tap-hint {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            font-size: 8.5px; letter-spacing: 0.55em; text-transform: uppercase;
            color: #fff; opacity: 0.9; pointer-events: none;
            animation: ph 2.4s infinite;
            z-index: 20;
        }
        @keyframes ph { 0%,100%{opacity:0.3} 50%{opacity:1} }
    </style>
</head>
<body>

<div id="cardOverlay">
    <div class="card">
        <div class="card-close" onclick="closeCard()">✕</div>
        <div class="card-body">
            <h1 class="card-script">Welcome</h1>
            <p class="card-text">We're honored to have you celebrate this special day with us.</p>
            
            <div class="line-divider"></div>
            
            <p class="badge-label">Your Assigned Seat</p>
            <div class="seat-badge">
                Table <span id="tableNo">TBA</span>, Seat <span id="seatNo">TBA</span>
            </div>

            <p class="footer-text">Wedding Celebration &nbsp;•&nbsp; 2026</p>
        </div>
    </div>
</div>

<div id="stage">
    <div class="envelope-wrapper" id="envelopeWrapper" onclick="openInvitation()">
        <div class="flap" id="flap"></div>
        <div class="wax-seal" id="waxSeal"></div>
    </div>
</div>

<div class="tap-hint" id="tapHint">Tap to Open</div>

<script>
    const params = new URLSearchParams(window.location.search);
    let table = params.get('table') || '';
    let seat = params.get('seat') || '';
    const sid = params.get('sid');

    if (sid && !table && !seat) {
        const idNum = parseInt(sid);
        if (!isNaN(idNum) && idNum > 0) {
            table = Math.ceil(idNum / 10);
            seat  = ((idNum - 1) % 10) + 1;
        }
    }

    document.getElementById('tableNo').innerText = table || 'TBA';
    document.getElementById('seatNo').innerText  = seat  || 'TBA';

    let isOpen = false;
    function openInvitation() {
        if (isOpen) return;
        isOpen = true;
        
        const wrapper = document.getElementById('envelopeWrapper');
        const flap    = document.getElementById('flap');
        const seal    = document.getElementById('waxSeal');
        const stage   = document.getElementById('stage');
        const overlay = document.getElementById('cardOverlay');
        const hint    = document.getElementById('tapHint');

        wrapper.classList.add('opened');
        // Very slight delay for the flap to start after the seal interaction
        setTimeout(() => { flap.classList.add('open'); }, 50);
        
        gsap.to(hint, { opacity: 0, duration: 0.3 });

        // Envelope fades and card slides in with premium timing
        setTimeout(() => stage.classList.add('fade-back'), 900);
        setTimeout(() => overlay.classList.add('visible'), 1200);

        setTimeout(() => {
            confetti({
                particleCount: 160,
                spread: 80,
                origin: { y: 0.65 },
                colors: ['#043927', '#C8A84B', '#ffffff', '#022116']
            });
        }, 1400);
    }

    function closeCard() {
        document.getElementById('cardOverlay').classList.remove('visible');
        setTimeout(() => document.getElementById('stage').classList.remove('fade-back'), 400);
    }
</script>
</body>
</html>
