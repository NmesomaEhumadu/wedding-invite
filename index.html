<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Honored Guest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Alex+Brush&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            background-image: url('emerald_floral_envelope_1776106539058.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Subtle dark overlay to ensure text/envelope readability */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        /* =============================================
           STAGE — envelope lives here, centered
           ============================================= */
        #stage {
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 10;
        }
        #stage.fade-back {
            opacity: 0.25;
            transform: scale(0.88) translateY(30px);
            pointer-events: none;
        }

        /* =============================================
           ENVELOPE WRAPPER
           ============================================= */
        .envelope-wrapper {
            position: relative;
            width: 90vw;
            height: 62.5vw;
            max-width: 500px;
            max-height: 350px;
            cursor: pointer;
            transition: transform 0.3s ease;
            background: rgba(4, 57, 39, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .envelope-wrapper:hover:not(.opened) {
            transform: translateY(-4px);
        }

        /* ── FLAP ── */
        .flap {
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            z-index: 10;
            transform-origin: top center;
            transition: transform 1.1s cubic-bezier(0.4, 0, 0.2, 1);
            background: #043927;
            clip-path: polygon(0% 0%, 100% 0%, 50% 50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .flap.open {
            transform: perspective(1600px) rotateX(-160deg);
        }

        /* ── WAX SEAL ── */
        .wax-seal {
            position: absolute;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 12vw; height: 12vw;
            max-width: 70px; max-height: 70px;
            min-width: 50px; min-height: 50px;
            border-radius: 50%;
            background: #ffffff;
            border: 1.5px solid rgba(4, 57, 39, 0.2);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            z-index: 20;
            transition: transform 0.6s ease, opacity 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            color: #043927;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .wax-seal::after {
            content: 'T&A';
            opacity: 0.8;
        }
        .wax-seal.gone {
            transform: translateX(-50%) scale(0);
            opacity: 0;
        }

        /* CARD OVERLAY */
        #cardOverlay {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.7s ease;
            background: rgba(0,0,0,0.8);
            padding: 20px;
        }
        #cardOverlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .card {
            background: #ffffff;
            width: 440px;
            max-width: 100%;
            max-height: 90vh;
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(4, 57, 39, 0.2);
            position: relative;
            transform: scale(0.9) translateY(40px);
            transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1);
            overflow: hidden;
        }
        #cardOverlay.visible .card {
            transform: scale(1) translateY(0);
        }

        .card-body {
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(4, 57, 39, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            overflow-y: auto;
        }
        .card::after {
            content: '';
            display: block;
            padding-top: 140%;
        }

        /* Card text from customer reference */
        .card-script { font-family: 'Alex Brush', cursive; color: #C8A84B; font-size: 4.5rem; line-height: 1; margin-bottom: 25px; }
        .card-text { font-size: 10px; letter-spacing: 0.15em; color: #444; line-height: 1.8; font-weight: 500; font-family: 'Montserrat', sans-serif; max-width: 280px; text-transform: uppercase; margin-bottom: 30px; }
        .line-divider { width: 50px; height: 2px; background: #C8A84B; margin-bottom: 30px; }
        .badge-label { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: #888; margin-bottom: 10px; }
        .seat-badge { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: #C8A84B; letter-spacing: 0.05em; margin-bottom: 25px; }

        @media (max-width: 480px) {
            .card-script { font-size: 3.5rem; }
            .card-text { font-size: 9px; line-height: 1.6; }
            .seat-badge { font-size: 1.4rem; }
            .card-body { padding: 30px 15px; }
        }

        .footer-text { font-size: 8px; letter-spacing: .46em; text-transform: uppercase; color: #bbb; margin-top: auto; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 20px; width: 100%; }

        /* Close button */
        .card-close {
            position: absolute;
            top: 10px; right: 10px;
            width: 26px; height: 26px;
            border-radius: 50%;
            background: rgba(0,0,0,0.05);
            color: #666;
            font-size: 14px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            z-index: 100;
        }

        .tap-hint {
            position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
            font-size: 9px; letter-spacing: .44em; text-transform: uppercase;
            color: #ddd; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px;
            pointer-events: none;
            animation: ph 2.2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes ph { 0%,100%{opacity:.4} 50%{opacity:1} }

        .sparkle {
            position: fixed; border-radius: 50%;
            background: #ffffff; pointer-events: none; z-index: 300; opacity: 0;
        }
    </style>
</head>
<body>

<div id="cardOverlay">
    <div class="card">
        <div class="card-close" onclick="closeCard()">✕</div>
        <div class="card-body">
            <h2 class="card-script">Welcome</h2>
            
            <p class="card-text">We're honored to have you celebrate this special day with us.</p>
            
            <div class="line-divider"></div>
            
            <div class="seating-area">
                <p class="badge-label">Your Assigned Seat</p>
                <div class="seat-badge">
                    Table <span id="tableNo">TBA</span>, Seat <span id="seatNo">TBA</span>
                </div>
            </div>

            <p class="footer-text">Wedding Celebration &nbsp;•&nbsp; 2026</p>
        </div>
    </div>
</div>

<div id="stage">
<div class="envelope-wrapper" id="envelopeWrapper" onclick="openInvitation()">
    <div class="flap" id="flap"></div>
    <div class="wax-seal" id="waxSeal"></div>
</div>
</div>

<div class="tap-hint" id="tapHint">Tap to Open</div>

<script>
    /* URL personalisation */
    const params = new URLSearchParams(window.location.search);
    let table  = params.get('table') || '';
    let seat   = params.get('seat')  || '';
    const sid  = params.get('sid'); // Sequential ID (1-260)

    /* Automatic calculation if sid is provided */
    if (sid && !table && !seat) {
        const idNum = parseInt(sid);
        if (!isNaN(idNum) && idNum > 0) {
            table = Math.ceil(idNum / 10);
            seat  = ((idNum - 1) % 10) + 1;
        }
    }

    /* Fallbacks */
    if (!table) table = 'TBA';
    if (!seat)  seat  = 'TBA';

    document.getElementById('tableNo').innerText = table;
    document.getElementById('seatNo').innerText  = seat;

    let isOpen = false;

    function openInvitation() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('envelopeWrapper').classList.add('opened');

        const flap    = document.getElementById('flap');
        const seal    = document.getElementById('waxSeal');
        const stage   = document.getElementById('stage');
        const overlay = document.getElementById('cardOverlay');
        const hint    = document.getElementById('tapHint');

        /* 1. Seal disappears */
        seal.classList.add('gone');

        /* 2. Flap opens (slight delay for better drama) */
        setTimeout(() => flap.classList.add('open'), 150);

        /* 3. Hint fades */
        gsap.to(hint, { opacity: 0, y: 8, duration: 0.4 });

        /* 4. Envelope fades back */
        setTimeout(() => stage.classList.add('fade-back'), 800);

        /* 5. Card overlay appears centered */
        setTimeout(() => overlay.classList.add('visible'), 1000);

        /* 6. Confetti */
        setTimeout(() => {
            const cfg = { origin: { y: 0.55 }, colors: ['#043927','#ffffff','#022a1d','#d4d4d4'] };
            const fire = (r, o) => confetti({ ...cfg, ...o, particleCount: Math.floor(140 * r) });
            fire(0.25, { spread: 28, startVelocity: 55 });
            fire(0.20, { spread: 65 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.10, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.10, { spread: 120, startVelocity: 45 });
        }, 1300);

        /* 7. Emerald sparkles */
        for (let i = 0; i < 20; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            document.body.appendChild(s);
            const sz = Math.random() * 5 + 2;
            gsap.set(s, { x: Math.random() * innerWidth, y: Math.random() * innerHeight, width: sz, height: sz, opacity: 0 });
            gsap.to(s, { opacity: 0.7, duration: Math.random() * 1.2 + 0.5, repeat: -1, yoyo: true, delay: Math.random() * 2.5 });
        }
    }

    function closeCard() {
        const overlay = document.getElementById('cardOverlay');
        const stage   = document.getElementById('stage');
        overlay.classList.remove('visible');
        setTimeout(() => stage.classList.remove('fade-back'), 400);
    }
</script>
</body>
</html>
