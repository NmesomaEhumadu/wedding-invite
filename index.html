<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Honored Guest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Alex+Brush&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            background-image: url('final_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Dark overlay for focus */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: -1;
        }

        /* =============================================
           INTERACTION STAGE
           ============================================= */
        #stage {
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 10;
        }
        #stage.fade-back {
            opacity: 0.1;
            transform: scale(0.8) translateY(10px);
            pointer-events: none;
        }

        .envelope-wrapper {
            position: relative;
            width: 75vw;
            height: 105vw;
            max-width: 320px;
            max-height: 440px;
            cursor: pointer;
        }

        /* Transparent click zone for the central seal area */
        .wax-seal {
            position: absolute;
            top: 55%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            z-index: 30;
            background: transparent;
        }

        /* Animated flap overlay */
        .flap {
            position: absolute;
            top: 26%;
            left: 5%;
            width: 90%;
            height: 35%;
            background: #043927;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 10;
            opacity: 0;
            transform-origin: top;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }
        .envelope-wrapper.opened .flap {
            opacity: 1;
        }
        .flap.open {
            transform: perspective(1000px) rotateX(-170deg);
        }

        /* CARD OVERLAY */
        #cardOverlay {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            padding: 15px;
        }
        #cardOverlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .card {
            background: #ffffff;
            width: 380px;
            max-width: 100%;
            max-height: 85vh;
            border-radius: 4px;
            box-shadow: 0 50px 120px rgba(0,0,0,0.9);
            border: 1px solid rgba(4, 57, 39, 0.1);
            position: relative;
            transform: scale(0.8) translateY(40px);
            transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
            overflow: hidden;
        }
        #cardOverlay.visible .card {
            transform: scale(1) translateY(0);
        }

        .card-body {
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(4, 57, 39, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px 15px;
            overflow-y: auto;
        }
        .card::after {
            content: '';
            display: block;
            padding-top: 140%;
        }

        /* Content theme: Emerald & Gold */
        .card-script { font-family: 'Alex Brush', cursive; color: #043927; font-size: 3.8rem; line-height: 1; margin-bottom: 20px; }
        .card-text { font-size: 9px; letter-spacing: 0.12em; color: #444; line-height: 1.6; font-weight: 500; text-transform: uppercase; margin-bottom: 30px; max-width: 240px; }
        .line-divider { width: 40px; height: 1.2px; background: #C8A84B; margin-bottom: 30px; }
        
        .badge-label { font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; color: #999; margin-bottom: 10px; }
        .seat-badge { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.6rem; 
            font-weight: 700; 
            color: #C8A84B; 
            letter-spacing: 0.05em; 
            background: #043927;
            padding: 12px 24px;
            border-radius: 4px;
        }

        @media (max-width: 480px) {
            .card-script { font-size: 2.8rem; }
            .card-text { font-size: 8.5px; }
            .seat-badge { font-size: 1.4rem; padding: 10px 20px; }
        }

        .footer-text { font-size: 6px; letter-spacing: .4em; text-transform: uppercase; color: #bbb; margin-top: auto; padding-top: 15px; }
        .card-close { position: absolute; top: 12px; right: 12px; font-size: 18px; color: #ccc; cursor: pointer; z-index: 10; }

        .tap-hint {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            font-size: 7px; letter-spacing: 0.5em; text-transform: uppercase;
            color: #fff; opacity: 0.8; pointer-events: none;
            animation: ph 2s infinite;
            z-index: 20;
        }
        @keyframes ph { 0%,100%{opacity:0.3} 50%{opacity:1} }
    </style>
</head>
<body>

<div id="cardOverlay">
    <div class="card">
        <div class="card-close" onclick="closeCard()">✕</div>
        <div class="card-body">
            <h1 class="card-script">Welcome</h1>
            <p class="card-text">We're honored to have you celebrate this special day with us.</p>
            
            <div class="line-divider"></div>
            
            <p class="badge-label">Your Assigned Seat</p>
            <div class="seat-badge">
                Table <span id="tableNo">TBA</span>, Seat <span id="seatNo">TBA</span>
            </div>

            <p class="footer-text">Wedding Celebration &nbsp;•&nbsp; 2026</p>
        </div>
    </div>
</div>

<div id="stage">
    <div class="envelope-wrapper" id="envelopeWrapper" onclick="openInvitation()">
        <div class="flap" id="flap"></div>
        <div class="wax-seal" id="waxSeal"></div>
    </div>
</div>

<div class="tap-hint" id="tapHint">Tap to Open</div>

<script>
    const params = new URLSearchParams(window.location.search);
    let table = params.get('table') || '';
    let seat = params.get('seat') || '';
    const sid = params.get('sid');

    if (sid && !table && !seat) {
        const idNum = parseInt(sid);
        if (!isNaN(idNum) && idNum > 0) {
            table = Math.ceil(idNum / 10);
            seat  = ((idNum - 1) % 10) + 1;
        }
    }

    document.getElementById('tableNo').innerText = table || 'TBA';
    document.getElementById('seatNo').innerText  = seat  || 'TBA';

    let isOpen = false;
    function openInvitation() {
        if (isOpen) return;
        isOpen = true;
        
        const wrapper = document.getElementById('envelopeWrapper');
        const flap    = document.getElementById('flap');
        const seal    = document.getElementById('waxSeal');
        const stage   = document.getElementById('stage');
        const overlay = document.getElementById('cardOverlay');
        const hint    = document.getElementById('tapHint');

        wrapper.classList.add('opened');
        flap.classList.add('open');
        gsap.to(hint, { opacity: 0, duration: 0.3 });

        setTimeout(() => stage.classList.add('fade-back'), 800);
        setTimeout(() => overlay.classList.add('visible'), 1100);

        setTimeout(() => {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#043927', '#C8A84B', '#ffffff']
            });
        }, 1300);
    }

    function closeCard() {
        document.getElementById('cardOverlay').classList.remove('visible');
        setTimeout(() => document.getElementById('stage').classList.remove('fade-back'), 400);
    }
</script>
</body>
</html>
